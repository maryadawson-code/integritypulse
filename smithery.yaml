# Smithery.ai configuration for OpenClaw Integrity Suite
# Zero-install remote MCP servers

startCommand:
  type: remote
  url: https://openclaw-finops.marywomack.workers.dev/mcp
  transport: streamable-http
  headers:
    x-api-key: "${API_KEY}"

name: openclaw-finops
display_name: "OpenClaw Integrity Suite — FinOps + Security + API Verification"
description: >
  Stop AI agents from hallucinating cloud costs, fabricating API endpoints, and
  generating insecure Terraform. Four MCP servers solving the top four problems
  hitting vibe coders:

  1. FinOps — Verified pricing for AWS, GCP, Azure (LLMs say RDS costs $15/mo, real: $204.40)
  2. API-Bridge — Live OpenAPI specs, not hallucinated endpoints
  3. Guardrail — Scans IaC for public S3, open SSH, ghost costs before terraform apply
  4. Fortress — Zero-trust live state verification with 12 tools

  Free tier: 25 ops/month. No credit card. Revenue-Gated MCP pattern.

icon: https://openclaw-finops.marywomack.workers.dev/icon.png

categories:
  - DevOps
  - FinOps
  - Cloud
  - Security
  - AI Agents

tags:
  - mcp-server
  - cloud-pricing
  - finops
  - terraform
  - security-scanning
  - vibe-coding
  - aws
  - gcp
  - azure
  - revenue-gate

configSchema:
  type: object
  required:
    - API_KEY
  properties:
    API_KEY:
      type: string
      title: API Key
      description: Your OpenClaw API key. Get one free — 25 ops/month, no credit card.

