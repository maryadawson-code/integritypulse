# Smithery.ai configuration for IntegrityPulse Integrity Suite

startCommand:
  type: remote
  url: https://integritypulse.marywomack.workers.dev/mcp
  transport: streamable-http
  headers:
    x-api-key: "${API_KEY}"

name: integritypulse
display_name: "IntegrityPulse Integrity Suite — FinOps + Security + API Verification"
description: >
  Stop AI agents from hallucinating cloud costs, fabricating API endpoints, and
  generating insecure Terraform. Four MCP servers solving the top four problems
  hitting vibe coders. Free tier: 25 ops/month.

categories:
  - DevOps
  - FinOps
  - Cloud
  - Security
  - AI Agents

tags:
  - mcp-server
  - cloud-pricing
  - finops
  - terraform
  - security-scanning
  - vibe-coding
  - aws
  - gcp
  - azure

configSchema:
  type: object
  required:
    - API_KEY
  properties:
    API_KEY:
      type: string
      title: API Key
      description: Your IntegrityPulse API key. Get one free — 25 ops/month, no credit card.
    DEFAULT_PROVIDER:
      type: string
      title: Default Cloud Provider
      description: Pre-select a cloud provider for forecasts. Optional — can always be overridden per request.
      enum:
        - AWS
        - GCP
        - AZURE
      default: AWS
    REFERRAL_CODE:
      type: string
      title: Referral Code
      description: Optional referral code. Both you and the referrer get +5 free operations.
